<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Validation</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="card">
    <h1>Create Account</h1>
    <p class="subtitle">All fields are required</p>

    <div id="successMsg" class="success-banner hidden">
      ✓ Account created successfully! Welcome aboard.
    </div>

    <div class="form">
      <div class="field" id="field-name">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Jane Doe" />
        <span class="error-msg"></span>
      </div>

      <div class="field" id="field-email">
        <label for="email">Email Address</label>
        <input type="text" id="email" placeholder="jane@example.com" />
        <span class="error-msg"></span>
      </div>

      <div class="field" id="field-password">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" />
        <span class="error-msg"></span>
      </div>

      <div class="field" id="field-confirm">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password" />
        <span class="error-msg"></span>
      </div>

      <button id="submitBtn" type="button">Create Account</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
